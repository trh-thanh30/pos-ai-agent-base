name: Publish Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: false
        default: latest

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            image: pos-system-api
          - name: web-main
            dockerfile: apps/web/main/Dockerfile
            image: pos-system-web-main
          - name: web-retail
            dockerfile: apps/web/retail/Dockerfile
            image: pos-system-web-retail
          - name: worker-email
            dockerfile: apps/worker/email/Dockerfile
            image: pos-system-worker-email
          - name: worker-telegram
            dockerfile: apps/worker/telegram/Dockerfile
            image: pos-system-worker-telegram
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.event.inputs.image_tag || 'latest' }}
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
