name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
      image_tag:
        description: Image tag to deploy
        required: true
        default: latest

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy POS
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_OWNER_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,GHCR_OWNER_REPO
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            export IMAGE_TAG="$IMAGE_TAG"
            export API_IMAGE="ghcr.io/${GHCR_OWNER_REPO}-pos-system-api"
            export WEB_MAIN_IMAGE="ghcr.io/${GHCR_OWNER_REPO}-pos-system-web-main"
            export WEB_RETAIL_IMAGE="ghcr.io/${GHCR_OWNER_REPO}-pos-system-web-retail"
            export WORKER_EMAIL_IMAGE="ghcr.io/${GHCR_OWNER_REPO}-pos-system-worker-email"
            export WORKER_TELEGRAM_IMAGE="ghcr.io/${GHCR_OWNER_REPO}-pos-system-worker-telegram"

            docker compose -f docker-compose.prod.yml --env-file .env.production pull api worker-email worker-telegram telegram-bot web-main web-retail
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm api npx prisma migrate deploy
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d db redis minio minio-init api worker-email worker-telegram telegram-bot web-main web-retail
            docker compose -f docker-compose.prod.yml --env-file .env.production ps

  notify:
    name: Telegram Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Send notification
        run: >
          pnpm notify:telegram
          --event deploy
          --status "${{ needs.deploy.result == 'success' && 'success' || 'failed' }}"
          --project pos-system
          --environment "${{ inputs.environment }}"
          --repository "${{ github.repository }}"
          --branch "${{ github.ref_name }}"
          --workflow "${{ github.workflow }}"
          --actor "${{ github.actor }}"
          --commit "${{ github.sha }}"
          --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          --message "image_tag=${{ inputs.image_tag }}"
        env:
          CI_TELEGRAM_BOT_TOKEN: ${{ secrets.CI_TELEGRAM_BOT_TOKEN }}
          CI_TELEGRAM_CHAT_ID: ${{ secrets.CI_TELEGRAM_CHAT_ID }}
