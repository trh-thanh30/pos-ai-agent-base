services:
  db:
    image: postgres:16-alpine
    container_name: pos-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos_password}
      POSTGRES_DB: ${POSTGRES_DB:-pos_db}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${PROD_DB_PORT:-25433}:5432"
    volumes:
      - pos_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pos-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-pos_redis_password}"]
    volumes:
      - pos_prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-pos_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: pos-prod-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - pos_prod_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: pos-prod-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-pos-system-public}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET_PRIVATE:-pos-system-private}
      MINIO_BUCKET_TEMP: ${MINIO_BUCKET_TEMP:-pos-system-temp}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing local/"$${MINIO_BUCKET_PUBLIC}"
        mc mb --ignore-existing local/"$${MINIO_BUCKET_PRIVATE}"
        mc mb --ignore-existing local/"$${MINIO_BUCKET_TEMP}"
        mc anonymous set download local/"$${MINIO_BUCKET_PUBLIC}"

  api:
    image: ${API_IMAGE:-pos-system-api}:${IMAGE_TAG:-latest}
    container_name: pos-prod-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-pos_user}
      DB_PASSWORD: ${DB_PASSWORD:-pos_password}
      DB_NAME: ${DB_NAME:-pos_db}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      DATABASE_URL: postgresql://${DB_USER:-pos_user}:${DB_PASSWORD:-pos_password}@db:5432/${DB_NAME:-pos_db}?schema=${DB_SCHEMA:-public}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-pos_redis_password}
      REDIS_URL: redis://:${REDIS_PASSWORD:-pos_redis_password}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-pos-system-public}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET_PRIVATE:-pos-system-private}
      MINIO_BUCKET_TEMP: ${MINIO_BUCKET_TEMP:-pos-system-temp}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-minio}
      ASSET_CDN_URL: ${ASSET_CDN_URL:-http://localhost:19000/pos-system-public}
      HEALTH_ENDPOINTS_ENABLED: "true"
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${API_PORT:-4100}:3000"
    volumes:
      - pos_prod_storage:/app/storage
      - pos_prod_uploads:/app/uploads

  worker-email:
    image: ${WORKER_EMAIL_IMAGE:-pos-system-worker-email}:${IMAGE_TAG:-latest}
    container_name: pos-prod-worker-email
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-pos_user}:${DB_PASSWORD:-pos_password}@db:5432/${DB_NAME:-pos_db}?schema=${DB_SCHEMA:-public}
      REDIS_URL: redis://:${REDIS_PASSWORD:-pos_redis_password}@redis:6379
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-POS System <no-reply@example.com>}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}

  worker-telegram:
    image: ${WORKER_TELEGRAM_IMAGE:-pos-system-worker-telegram}:${IMAGE_TAG:-latest}
    container_name: pos-prod-worker-telegram
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD:-pos_redis_password}@redis:6379
      CI_TELEGRAM_BOT_TOKEN: ${CI_TELEGRAM_BOT_TOKEN:-}
      CI_TELEGRAM_CHAT_ID: ${CI_TELEGRAM_CHAT_ID:-}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}

  telegram-bot:
    image: ${WORKER_TELEGRAM_IMAGE:-pos-system-worker-telegram}:${IMAGE_TAG:-latest}
    container_name: pos-prod-telegram-bot
    restart: unless-stopped
    command: ["node", "dist/main-bot-service.js"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD:-pos_redis_password}@redis:6379
      CI_TELEGRAM_BOT_TOKEN: ${CI_TELEGRAM_BOT_TOKEN:-}
      CI_TELEGRAM_CHAT_ID: ${CI_TELEGRAM_CHAT_ID:-}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}

  web-main:
    image: ${WEB_MAIN_IMAGE:-pos-system-web-main}:${IMAGE_TAG:-latest}
    container_name: pos-prod-web-main
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4100/api/v1}
      NEXT_ASSET_API_URL: ${NEXT_ASSET_API_URL:-http://localhost:4100/uploads/public/}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${WEB_MAIN_PORT:-4101}:3000"

  web-retail:
    image: ${WEB_RETAIL_IMAGE:-pos-system-web-retail}:${IMAGE_TAG:-latest}
    container_name: pos-prod-web-retail
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4100/api/v1}
      NEXT_ASSET_API_URL: ${NEXT_ASSET_API_URL:-http://localhost:4100/uploads/public/}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${WEB_RETAIL_PORT:-4102}:3001"

volumes:
  pos_prod_postgres_data:
  pos_prod_redis_data:
  pos_prod_minio_data:
  pos_prod_storage:
  pos_prod_uploads:
